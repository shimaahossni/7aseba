workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: Shimaa Hossni
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.shimaa.calculator
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

